version: "3.8"
services:
  app:
    build: .
    container_name: image_server_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

    env_file:
      - .env
    environment:
      IMAGES_DIR: /images
      LOGS_DIR: /logs

    volumes:
      - images:/images
      - logs:/logs

  db:
    image: postgres:15
    container_name: image_server_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10


  nginx:
    image: nginx:1.27-alpine-slim
    container_name: images_server_nginx
    restart: unless-stopped

    depends_on:
      - app

    ports:
      - "8080:80"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/static:ro
      - images:/images:ro
      - logs:/logs:ro

volumes:
  images:
  logs:
  db_data:
