version: "3.8"
services:
  app:
    build: .
    container_name: image_server_app
    restart: unless-stopped
    ports:
      - "5000:5000"

    environment:
      IMAGES_DIR: /images
      LOGS_DIR: /logs

    volumes:
      - images:/images
      - logs:/logs

  nginx:
    image: nginx:1.27-alpine-slim
    container_name: images_server_nginx
    restart: unless-stopped

    depends_on:
      - app

    ports:
      - "8080:80"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/static:ro
      - images:/images:ro
      - logs:/logs:ro

volumes:
  images:
  logs:
